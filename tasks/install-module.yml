---
# tasks/install-module.yml
# Install a single Omeka S module by writing directly to the Docker volume.
# Called from manage-modules.yml with loop_var: mod_name
#
# Downloads on the Ansible controller and extracts on the remote in one step.
# No intermediate files on the remote needed.

- name: "{{ mod_name }} | Validate module is known"
  ansible.builtin.assert:
    that:
      - mod_name in module_sources
    fail_msg: "Unknown module '{{ mod_name }}'. Add it to module_sources in manage-modules.yml."

- name: "{{ mod_name }} | Set paths"
  ansible.builtin.set_fact:
    _vol_modules_path: "/var/lib/docker/volumes/{{ instance }}_omeka_files/_data/modules"

- name: "{{ mod_name }} | Check if already installed"
  ansible.builtin.stat:
    path: "{{ _vol_modules_path }}/{{ mod_name }}"
  register: _mod_exists
  become: true

- name: "{{ mod_name }} | Skip if already installed (install mode)"
  ansible.builtin.debug:
    msg: "Module {{ mod_name }} is already installed. Use module_action=update to reinstall."
  when:
    - module_action == 'install'
    - _mod_exists.stat.exists | default(false)

- name: "{{ mod_name }} | Remove old version (update mode)"
  ansible.builtin.file:
    path: "{{ _vol_modules_path }}/{{ mod_name }}"
    state: absent
  become: true
  when:
    - module_action == 'update'
    - _mod_exists.stat.exists | default(false)

- name: "{{ mod_name }} | Install module"
  when: not (_mod_exists.stat.exists | default(false)) or module_action == 'update'
  block:
    - name: "{{ mod_name }} | Set module source info"
      ansible.builtin.set_fact:
        _mod_repo: "{{ module_sources[mod_name].repo }}"
        _mod_branch: "{{ module_sources[mod_name].branch }}"

    - name: "{{ mod_name }} | Download and extract module to Docker volume"
      ansible.builtin.unarchive:
        src: "https://github.com/{{ _mod_repo }}/archive/refs/heads/{{ _mod_branch }}.zip"
        dest: "{{ _vol_modules_path }}"
        remote_src: false
      become: true
      register: _mod_extract
      ignore_errors: true

    - name: "{{ mod_name }} | Try tag URL if branch failed"
      ansible.builtin.unarchive:
        src: "https://github.com/{{ _mod_repo }}/archive/refs/tags/{{ _mod_branch }}.zip"
        dest: "{{ _vol_modules_path }}"
        remote_src: false
      become: true
      when: _mod_extract is failed

    - name: "{{ mod_name }} | Find extracted directory"
      ansible.builtin.find:
        paths: "{{ _vol_modules_path }}"
        patterns: "*{{ _mod_repo | regex_replace('.*/','') }}*"
        file_type: directory
        recurse: false
      register: _mod_extracted
      become: true

    - name: "{{ mod_name }} | Rename to correct module name"
      ansible.builtin.copy:
        src: "{{ _mod_extracted.files[0].path }}/"
        dest: "{{ _vol_modules_path }}/{{ mod_name }}/"
        remote_src: true
        owner: "33"
        group: "33"
        mode: "0775"
      become: true
      when:
        - _mod_extracted.files | length > 0
        - _mod_extracted.files[0].path != (_vol_modules_path + '/' + mod_name)

    - name: "{{ mod_name }} | Remove archive-named folder"
      ansible.builtin.file:
        path: "{{ _mod_extracted.files[0].path }}"
        state: absent
      become: true
      when:
        - _mod_extracted.files | length > 0
        - _mod_extracted.files[0].path != (_vol_modules_path + '/' + mod_name)

    - name: "{{ mod_name }} | Set ownership"
      ansible.builtin.file:
        path: "{{ _vol_modules_path }}/{{ mod_name }}"
        state: directory
        recurse: true
        owner: "33"
        group: "33"
      become: true

    - name: "{{ mod_name }} | Module installed"
      ansible.builtin.debug:
        msg: "Module {{ mod_name }} installed. Activate it in Omeka S admin panel."
