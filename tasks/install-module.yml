---
# tasks/install-module.yml
# Install a single Omeka S module by writing directly to the Docker volume.
# Called from manage-modules.yml with loop_var: mod_name
#
# Uses ONLY file-management modules for Semaphore compatibility.

- name: "{{ mod_name }} | Validate module is known"
  ansible.builtin.assert:
    that:
      - mod_name in module_sources
    fail_msg: "Unknown module '{{ mod_name }}'. Add it to module_sources in manage-modules.yml."

- name: "{{ mod_name }} | Set paths"
  ansible.builtin.set_fact:
    _vol_modules_path: "/var/lib/docker/volumes/{{ instance }}_omeka_files/_data/modules"
    _dl_dest: "/tmp/omeka_module_{{ mod_name }}.zip"

- name: "{{ mod_name }} | Check if already installed"
  ansible.builtin.stat:
    path: "{{ _vol_modules_path }}/{{ mod_name }}"
  register: _mod_exists
  become: true

- name: "{{ mod_name }} | Skip if already installed (install mode)"
  ansible.builtin.debug:
    msg: "Module {{ mod_name }} is already installed. Use module_action=update to reinstall."
  when:
    - module_action == 'install'
    - _mod_exists.stat.exists | default(false)

- name: "{{ mod_name }} | Remove old version (update mode)"
  ansible.builtin.file:
    path: "{{ _vol_modules_path }}/{{ mod_name }}"
    state: absent
  become: true
  when:
    - module_action == 'update'
    - _mod_exists.stat.exists | default(false)

- name: "{{ mod_name }} | Install module"
  when: not (_mod_exists.stat.exists | default(false)) or module_action == 'update'
  block:
    - name: "{{ mod_name }} | Set module source info"
      ansible.builtin.set_fact:
        _mod_repo: "{{ module_sources[mod_name].repo }}"
        _mod_branch: "{{ module_sources[mod_name].branch }}"

    - name: "{{ mod_name }} | Download module archive"
      ansible.builtin.get_url:
        url: "https://github.com/{{ _mod_repo }}/archive/refs/heads/{{ _mod_branch }}.zip"
        dest: "{{ _dl_dest }}"
        mode: "0644"
        force: true
      become: true
      register: _mod_download
      ignore_errors: true

    - name: "{{ mod_name }} | Try tag download if branch failed"
      ansible.builtin.get_url:
        url: "https://github.com/{{ _mod_repo }}/archive/refs/tags/{{ _mod_branch }}.zip"
        dest: "{{ _dl_dest }}"
        mode: "0644"
        force: true
      become: true
      when: _mod_download is failed

    - name: "{{ mod_name }} | Extract archive directly to Docker volume"
      ansible.builtin.unarchive:
        src: "{{ _dl_dest }}"
        dest: "{{ _vol_modules_path }}"
        remote_src: true
      become: true

    - name: "{{ mod_name }} | Find extracted directory in volume"
      ansible.builtin.find:
        paths: "{{ _vol_modules_path }}"
        patterns: "*{{ mod_name }}*,*{{ _mod_repo | regex_replace('.*/','') }}*"
        file_type: directory
        recurse: false
      register: _mod_extracted
      become: true

    - name: "{{ mod_name }} | Identify extracted folder"
      ansible.builtin.set_fact:
        _mod_src_dir: "{{ (_mod_extracted.files | sort(attribute='path') | last).path }}"
      when: _mod_extracted.files | length > 0

    - name: "{{ mod_name }} | Rename extracted folder to module name"
      ansible.builtin.copy:
        src: "{{ _mod_src_dir }}/"
        dest: "{{ _vol_modules_path }}/{{ mod_name }}/"
        remote_src: true
        owner: "33"
        group: "33"
        mode: "0775"
      become: true
      when: _mod_src_dir != (_vol_modules_path + '/' + mod_name)

    - name: "{{ mod_name }} | Remove extracted archive folder"
      ansible.builtin.file:
        path: "{{ _mod_src_dir }}"
        state: absent
      become: true
      when:
        - _mod_src_dir is defined
        - _mod_src_dir != (_vol_modules_path + '/' + mod_name)

    - name: "{{ mod_name }} | Set ownership on module"
      ansible.builtin.file:
        path: "{{ _vol_modules_path }}/{{ mod_name }}"
        state: directory
        recurse: true
        owner: "33"
        group: "33"
        mode: "0775"
      become: true

    - name: "{{ mod_name }} | Clean up download"
      ansible.builtin.file:
        path: "{{ _dl_dest }}"
        state: absent
      become: true

    - name: "{{ mod_name }} | Module installed"
      ansible.builtin.debug:
        msg: "Module {{ mod_name }} installed. Activate it in Omeka S admin panel."
