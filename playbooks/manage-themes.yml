---
# =============================================================================
# Install or update extra themes for an instance
#
# Themes are installed by the container entrypoint via EXTRA_THEMES env var.
# This playbook updates the .env file and recreates containers.
#
# Install:
#   ansible-playbook playbooks/manage-themes.yml \
#     -e "instance=test-instance themes=cozy,foundation"
#
# Update:
#   ansible-playbook playbooks/manage-themes.yml \
#     -e "instance=test-instance themes=cozy theme_action=update"
# =============================================================================

- name: Manage Omeka S themes
  hosts: omeka_servers
  become: true

  vars:
    omeka_base_dir: /opt/omeka-s
    omeka_instances_dir: "{{ omeka_base_dir }}/instances"
    theme_action: install

  pre_tasks:
    - name: Validate parameters
      ansible.builtin.assert:
        that:
          - instance is defined
          - instance in omeka_instances
          - themes is defined
          - theme_action in ['install', 'update']
        fail_msg: "Required: -e 'instance=<name> themes=Theme1,Theme2' (optional: theme_action=update)"

    - name: Set instance variables
      ansible.builtin.set_fact:
        _instance_dir: "{{ omeka_instances_dir }}/{{ instance }}"
        _instance_config: "{{ omeka_instances[instance] }}"
        _new_themes: "{{ themes.split(',') | map('trim') | list }}"

    - name: Build merged theme list
      ansible.builtin.set_fact:
        _all_extra_themes: "{{ ((_instance_config.extra_themes | default([])) + _new_themes) | unique }}"

    - name: Show plan
      ansible.builtin.debug:
        msg: "Action: {{ theme_action }} | Themes: {{ _all_extra_themes | join(', ') }}"

  tasks:
    # --- Step 1: Update .env to include EXTRA_THEMES ---
    # Uses shell instead of copy/lineinfile to avoid Semaphore ghost-write issues
    - name: Update EXTRA_THEMES in .env
      ansible.builtin.shell:
        cmd: |
          sed -i '/^EXTRA_THEMES=/d' .env
          echo 'EXTRA_THEMES={{ _all_extra_themes | join(",") }}' >> .env
        chdir: "{{ _instance_dir }}"
      changed_when: true
      check_mode: false

    # --- Step 2: For updates, remove theme dirs so entrypoint re-downloads ---
    - name: "Remove theme directories for update"
      ansible.builtin.file:
        path: "/var/lib/docker/volumes/{{ instance }}_omeka_files/_data/themes/{{ item }}"
        state: absent
      loop: "{{ _new_themes }}"
      when: theme_action == 'update'

    # --- Step 3: Recreate containers to trigger entrypoint ---
    # Uses shell down/up instead of docker_compose_v2 to avoid Semaphore ghost-recreate
    - name: Recreate containers to trigger theme installation
      ansible.builtin.shell:
        cmd: docker compose down && docker compose up -d
        chdir: "{{ _instance_dir }}"
      changed_when: true
      check_mode: false

    # --- Step 4: Health check ---
    - name: Wait for instance to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ _instance_config.nginx_port }}/"
        method: GET
        status_code: [200, 301, 302, 401, 403]
        timeout: 10
      register: _health
      until: _health is succeeded
      retries: 30
      delay: 10

    # --- Step 5: Verify themes exist ---
    - name: Check installed themes
      ansible.builtin.stat:
        path: "/var/lib/docker/volumes/{{ instance }}_omeka_files/_data/themes/{{ item }}"
      loop: "{{ _new_themes }}"
      register: _theme_check

    - name: Report results
      ansible.builtin.debug:
        msg: "{{ item.item }}: {{ 'INSTALLED' if item.stat.exists else 'FAILED' }}"
      loop: "{{ _theme_check.results }}"
      loop_control:
        label: "{{ item.item }}"
