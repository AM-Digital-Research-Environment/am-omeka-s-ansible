---
# =============================================================================
# Install extra modules for an instance
#
# Modules are installed by the container entrypoint via EXTRA_MODULES env var.
# This playbook updates the .env file and recreates the PHP container.
#
# Usage:
#   ansible-playbook playbooks/manage-modules.yml \
#     -e "instance=test-instance modules=CSSEditor,AdvancedSearch"
#
# Supports module short names (CSSEditor) or full format (CSSEditor:omeka-s-modules/CSSEditor:master)
# Dependencies are resolved automatically by the entrypoint.
# =============================================================================

- name: Install Omeka S modules
  hosts: omeka_servers
  become: true

  vars:
    omeka_base_dir: /opt/omeka-s
    omeka_instances_dir: "{{ omeka_base_dir }}/instances"

  pre_tasks:
    - name: Validate parameters
      ansible.builtin.assert:
        that:
          - instance is defined
          - instance in omeka_instances
          - modules is defined
        fail_msg: "Required: -e 'instance=<name> modules=CSSEditor,AdvancedSearch'"

    - name: Set instance variables
      ansible.builtin.set_fact:
        _instance_dir: "{{ omeka_instances_dir }}/{{ instance }}"
        _instance_config: "{{ omeka_instances[instance] }}"
        _new_modules: "{{ modules.split(',') | map('trim') | list }}"

    - name: Build merged module list
      ansible.builtin.set_fact:
        _all_extra_modules: "{{ ((_instance_config.extra_modules | default([])) + _new_modules) | unique }}"

    - name: Show modules to install
      ansible.builtin.debug:
        msg: "Extra modules for {{ instance }}: {{ _all_extra_modules | join(', ') }}"

  tasks:
    - name: Read current .env file
      ansible.builtin.slurp:
        src: "{{ _instance_dir }}/.env"
      register: _current_env

    - name: Update EXTRA_MODULES in .env
      ansible.builtin.lineinfile:
        path: "{{ _instance_dir }}/.env"
        regexp: "^EXTRA_MODULES="
        line: "EXTRA_MODULES={{ _all_extra_modules | join(',') }}"
        state: present
      register: _env_updated

    - name: Insert EXTRA_MODULES if not present
      ansible.builtin.lineinfile:
        path: "{{ _instance_dir }}/.env"
        line: "EXTRA_MODULES={{ _all_extra_modules | join(',') }}"
        state: present
      when: "'EXTRA_MODULES' not in (_current_env.content | b64decode)"

    - name: Recreate PHP container to trigger module installation
      community.docker.docker_compose_v2:
        project_src: "{{ _instance_dir }}"
        state: present
        pull: never
        recreate: always
        wait: true
        wait_timeout: 300
      become: true
      when: _env_updated is changed

    - name: Wait for instance to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ _instance_config.nginx_port }}/"
        method: GET
        status_code: [200, 301, 302, 401, 403]
        timeout: 10
      register: _health
      until: _health is succeeded
      retries: 30
      delay: 10

    - name: Modules installed
      ansible.builtin.debug:
        msg: "Modules {{ _all_extra_modules | join(', ') }} installed. Activate them in Omeka S admin panel."
