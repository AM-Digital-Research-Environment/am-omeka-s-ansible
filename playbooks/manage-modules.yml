---
# =============================================================================
# Install or update modules for an instance
# Usage:
#   ansible-playbook playbooks/manage-modules.yml -e "instance=archives-main module_action=install modules=CSVImport,UniversalViewer"
#   ansible-playbook playbooks/manage-modules.yml -e "instance=archives-main module_action=update modules=CSVImport"
# =============================================================================

- name: Manage Omeka S modules
  hosts: omeka_servers
  become: true

  vars:
    omeka_base_dir: /opt/omeka-s
    omeka_instances_dir: "{{ omeka_base_dir }}/instances"

  pre_tasks:
    - name: Validate parameters
      ansible.builtin.assert:
        that:
          - instance is defined
          - instance in omeka_instances
          - module_action is defined
          - module_action in ['install', 'update']
          - modules is defined
        fail_msg: "Required: -e 'instance=<name> module_action=install|update modules=Mod1,Mod2'"

    - name: Set instance directory
      ansible.builtin.set_fact:
        _instance_dir: "{{ omeka_instances_dir }}/{{ instance }}"

  tasks:
    - name: "{{ module_action | capitalize }} modules"
      ansible.builtin.shell: |
        bash scripts/{{ (module_action == 'install') | ternary('install-module.sh', 'update-module.sh') }} {{ item }}
      args:
        chdir: "{{ _instance_dir }}"
      loop: "{{ modules.split(',') }}"
      loop_control:
        label: "{{ item }}"
      become: true
      register: module_result
      changed_when: "'installed' in module_result.stdout or 'updated' in module_result.stdout"
      failed_when: module_result.rc != 0
