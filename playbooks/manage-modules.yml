---
# =============================================================================
# Install or update extra modules for an instance
#
# Modules are installed by the container entrypoint via EXTRA_MODULES env var.
# This playbook updates the .env file and recreates containers.
#
# Install (skip existing):
#   ansible-playbook playbooks/manage-modules.yml \
#     -e "instance=test-instance modules=CSSEditor,AdvancedSearch"
#
# Update (re-download):
#   ansible-playbook playbooks/manage-modules.yml \
#     -e "instance=test-instance modules=CSSEditor module_action=update"
# =============================================================================

- name: Manage Omeka S modules
  hosts: omeka_servers
  become: true

  vars:
    omeka_base_dir: /opt/omeka-s
    omeka_instances_dir: "{{ omeka_base_dir }}/instances"
    module_action: install

  pre_tasks:
    - name: Validate parameters
      ansible.builtin.assert:
        that:
          - instance is defined
          - instance in omeka_instances
          - modules is defined
          - module_action in ['install', 'update']
        fail_msg: "Required: -e 'instance=<name> modules=CSSEditor,AdvancedSearch' (optional: module_action=update)"

    - name: Set instance variables
      ansible.builtin.set_fact:
        _instance_dir: "{{ omeka_instances_dir }}/{{ instance }}"
        _instance_config: "{{ omeka_instances[instance] }}"
        _new_modules: "{{ modules.split(',') | map('trim') | list }}"

    - name: Build merged module list
      ansible.builtin.set_fact:
        _all_extra_modules: "{{ ((_instance_config.extra_modules | default([])) + _new_modules) | unique }}"

    - name: Show plan
      ansible.builtin.debug:
        msg: "Action: {{ module_action }} | Modules: {{ _all_extra_modules | join(', ') }}"

  tasks:
    # --- Step 1: Update .env to include EXTRA_MODULES ---
    # Uses shell instead of copy/lineinfile to avoid Semaphore ghost-write issues
    - name: Update EXTRA_MODULES in .env
      ansible.builtin.shell:
        cmd: |
          sed -i '/^EXTRA_MODULES=/d' .env
          echo 'EXTRA_MODULES={{ _all_extra_modules | join(",") }}' >> .env
        chdir: "{{ _instance_dir }}"
      changed_when: true

    # --- Step 2: For updates, remove module dirs so entrypoint re-downloads ---
    - name: "Remove module directories for update"
      ansible.builtin.file:
        path: "/var/lib/docker/volumes/{{ instance }}_omeka_files/_data/modules/{{ item }}"
        state: absent
      loop: "{{ _new_modules }}"
      when: module_action == 'update'

    # --- Step 3: Recreate containers to trigger entrypoint ---
    # Uses shell down/up instead of docker_compose_v2 to avoid Semaphore ghost-recreate
    - name: Recreate containers to trigger module installation
      ansible.builtin.shell:
        cmd: docker compose down && docker compose up -d
        chdir: "{{ _instance_dir }}"
      changed_when: true

    # --- Step 4: Health check ---
    - name: Wait for instance to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ _instance_config.nginx_port }}/"
        method: GET
        status_code: [200, 301, 302, 401, 403]
        timeout: 10
      register: _health
      until: _health is succeeded
      retries: 30
      delay: 10

    # --- Step 5: Verify modules exist ---
    - name: Check installed modules
      ansible.builtin.stat:
        path: "/var/lib/docker/volumes/{{ instance }}_omeka_files/_data/modules/{{ item }}"
      loop: "{{ _new_modules }}"
      register: _mod_check

    - name: Report results
      ansible.builtin.debug:
        msg: "{{ item.item }}: {{ 'INSTALLED' if item.stat.exists else 'FAILED' }}"
      loop: "{{ _mod_check.results }}"
      loop_control:
        label: "{{ item.item }}"
