---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
  become: true

- name: Set ufw default deny incoming
  community.general.ufw:
    direction: incoming
    default: deny
  become: true

- name: Set ufw default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow
  become: true

- name: Allow TCP ports through firewall
  community.general.ufw:
    rule: allow
    port: "{{ tcp_port }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"
  loop_control:
    loop_var: tcp_port
  become: true

- name: Enable ufw
  community.general.ufw:
    state: enabled
  become: true
