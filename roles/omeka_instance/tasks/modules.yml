---
# roles/omeka_instance/tasks/modules.yml
# Modules are installed by the container entrypoint via EXTRA_MODULES env var.
# The env.j2 template includes EXTRA_MODULES from instance_config.extra_modules.
# No action needed here — just log what's configured.

- name: "{{ instance_name }} | Extra modules configured"
  ansible.builtin.debug:
    msg: >-
      Extra modules: {{ instance_config.extra_modules | default([]) | join(', ') | default('none', true) }}.
      Installed by container entrypoint via EXTRA_MODULES env var.
  when: instance_config.extra_modules is defined and instance_config.extra_modules | length > 0
