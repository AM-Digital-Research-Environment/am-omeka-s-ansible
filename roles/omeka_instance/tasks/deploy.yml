---
# roles/omeka_instance/tasks/deploy.yml
# Build and start the Docker Compose stack for the instance.

- name: "{{ instance_name }} | Build Docker images"
  ansible.builtin.shell:
    cmd: docker compose build --pull
    chdir: "{{ omeka_instances_dir }}/{{ instance_name }}"
  register: _docker_build
  changed_when: "'writing image' in _docker_build.stdout or 'exporting layers' in _docker_build.stdout"

- name: "{{ instance_name }} | Start containers"
  ansible.builtin.shell:
    cmd: docker compose up -d
    chdir: "{{ omeka_instances_dir }}/{{ instance_name }}"
  register: _docker_up
  changed_when: "'Started' in _docker_up.stderr or 'Creating' in _docker_up.stderr or 'Recreat' in _docker_up.stderr"
