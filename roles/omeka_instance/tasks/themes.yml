---
# roles/omeka_instance/tasks/themes.yml
# Themes are installed by the container entrypoint via EXTRA_THEMES env var.
# The env.j2 template includes EXTRA_THEMES from instance_config.extra_themes.
# No action needed here — just log what's configured.

- name: "{{ instance_name }} | Extra themes configured"
  ansible.builtin.debug:
    msg: >-
      Extra themes: {{ instance_config.extra_themes | default([]) | join(', ') | default('none', true) }}.
      Installed by container entrypoint via EXTRA_THEMES env var.
  when: instance_config.extra_themes is defined and instance_config.extra_themes | length > 0
