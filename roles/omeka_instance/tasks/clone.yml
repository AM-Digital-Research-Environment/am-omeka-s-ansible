---
# roles/omeka_instance/tasks/clone.yml
# Create instance directory and clone/update the omeka-s-docker repository.

- name: "{{ instance_name }} | Ensure instances base directory exists"
  ansible.builtin.file:
    path: "{{ omeka_instances_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: "{{ instance_name }} | Create instance directory"
  ansible.builtin.file:
    path: "{{ omeka_instances_dir }}/{{ instance_name }}"
    state: directory
    mode: "0755"
  become: true

- name: "{{ instance_name }} | Debug connection target"
  ansible.builtin.command: hostname
  become: true
  register: _hostname
  changed_when: false

- name: "{{ instance_name }} | Show connection info"
  ansible.builtin.debug:
    msg: "Running on: {{ _hostname.stdout }} | Connection: {{ ansible_connection | default('unknown') }}"

- name: "{{ instance_name }} | Clone or update omeka-s-docker repository"
  ansible.builtin.git:
    repo: "{{ omeka_docker_repo }}"
    dest: "{{ omeka_instances_dir }}/{{ instance_name }}"
    version: "{{ omeka_docker_branch }}"
    force: false
    update: true
  become: true

- name: "{{ instance_name }} | List cloned directory contents"
  ansible.builtin.command: ls -la {{ omeka_instances_dir }}/{{ instance_name }}/
  become: true
  register: _dir_list
  changed_when: false

- name: "{{ instance_name }} | Show directory contents"
  ansible.builtin.debug:
    var: _dir_list.stdout_lines
