---
# roles/omeka_instance/tasks/clone.yml
# Create instance directory and clone/update the omeka-s-docker repository.

- name: "{{ instance_name }} | Check if instance path exists"
  ansible.builtin.stat:
    path: "{{ omeka_instances_dir }}/{{ instance_name }}"
  become: true
  register: _instance_path

- name: "{{ instance_name }} | Remove stale instance path if not a directory"
  ansible.builtin.file:
    path: "{{ omeka_instances_dir }}/{{ instance_name }}"
    state: absent
  become: true
  when: _instance_path.stat.exists and not _instance_path.stat.isdir

- name: "{{ instance_name }} | Ensure instances base directory exists"
  ansible.builtin.file:
    path: "{{ omeka_instances_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: "{{ instance_name }} | Clone or update omeka-s-docker repository"
  ansible.builtin.git:
    repo: "{{ omeka_docker_repo }}"
    dest: "{{ omeka_instances_dir }}/{{ instance_name }}"
    version: "{{ omeka_docker_branch }}"
    force: false
    update: true
  become: true

- name: "{{ instance_name }} | Verify docker-compose.yml exists after clone"
  ansible.builtin.stat:
    path: "{{ omeka_instances_dir }}/{{ instance_name }}/docker-compose.yml"
  become: true
  register: _compose_file

- name: "{{ instance_name }} | Show clone result"
  ansible.builtin.debug:
    msg: "Clone path: {{ omeka_instances_dir }}/{{ instance_name }} | docker-compose.yml exists: {{ _compose_file.stat.exists }}"

- name: "{{ instance_name }} | Fail if docker-compose.yml not found after clone"
  ansible.builtin.fail:
    msg: >-
      docker-compose.yml not found at {{ omeka_instances_dir }}/{{ instance_name }}/.
      The git clone may have failed silently. Check repo URL: {{ omeka_docker_repo }}
  when: not _compose_file.stat.exists
