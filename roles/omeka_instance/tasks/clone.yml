---
# roles/omeka_instance/tasks/clone.yml
# Create instance directory and clone/update the omeka-s-docker repository.

- name: "{{ instance_name }} | Debug — show hostname and instance path"
  ansible.builtin.shell: "hostname && echo '---' && ls -la {{ omeka_instances_dir }}/ 2>&1 || true"
  become: true
  register: _debug_info
  changed_when: false

- name: "{{ instance_name }} | Debug output"
  ansible.builtin.debug:
    var: _debug_info.stdout_lines

- name: "{{ instance_name }} | Check if instance path exists"
  ansible.builtin.stat:
    path: "{{ omeka_instances_dir }}/{{ instance_name }}"
  become: true
  register: _instance_path

- name: "{{ instance_name }} | Remove stale instance path if not a directory"
  ansible.builtin.file:
    path: "{{ omeka_instances_dir }}/{{ instance_name }}"
    state: absent
  become: true
  when: _instance_path.stat.exists and not _instance_path.stat.isdir

- name: "{{ instance_name }} | Ensure instances base directory exists"
  ansible.builtin.file:
    path: "{{ omeka_instances_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: "{{ instance_name }} | Clone or update omeka-s-docker repository"
  ansible.builtin.git:
    repo: "{{ omeka_docker_repo }}"
    dest: "{{ omeka_instances_dir }}/{{ instance_name }}"
    version: "{{ omeka_docker_branch }}"
    force: false
    update: true
  become: true

- name: "{{ instance_name }} | Verify clone contents"
  ansible.builtin.shell: "ls -la {{ omeka_instances_dir }}/{{ instance_name }}/"
  become: true
  register: _clone_contents
  changed_when: false

- name: "{{ instance_name }} | Show clone contents"
  ansible.builtin.debug:
    var: _clone_contents.stdout_lines
