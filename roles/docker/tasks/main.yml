---
- name: Check if Docker binary exists
  ansible.builtin.stat:
    path: /usr/bin/docker
  register: _docker_binary
  become: true

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
  become: true
  when: not _docker_binary.stat.exists

- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true
  when: not _docker_binary.stat.exists

- name: Determine OS distribution for Docker repo
  ansible.builtin.set_fact:
    _docker_os: "{{ ansible_lsb.id | default(ansible_distribution) | lower }}"
    _docker_codename: "{{ ansible_lsb.codename | default(ansible_distribution_release) }}"

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: "https://download.docker.com/linux/{{ _docker_os }}/gpg"
    keyring: /etc/apt/keyrings/docker.gpg
    state: present
  become: true
  when: not _docker_binary.stat.exists

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
      signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/{{ _docker_os }}
      {{ _docker_codename }} stable
    state: present
    filename: docker
  become: true
  when: not _docker_binary.stat.exists

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true
  become: true
  when: not _docker_binary.stat.exists

- name: Create Docker configuration directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"
  become: true

- name: Configure Docker daemon
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  become: true
  notify: Restart docker

- name: Start and enable Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  become: true

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true
  become: true
