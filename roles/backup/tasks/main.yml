---
# roles/backup/tasks/main.yml
# Sets up automated backups for Omeka S instances.

- name: Create backup base directory
  ansible.builtin.file:
    path: "{{ backup_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true

- name: Create per-instance backup directories
  ansible.builtin.file:
    path: "{{ backup_base_dir }}/{{ backup_instance.key }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop: "{{ omeka_instances | dict2items }}"
  loop_control:
    loop_var: backup_instance
    label: "{{ backup_instance.key }}"
  when: backup_instance.value.backup_enabled | default(false)
  become: true

- name: Template backup script
  ansible.builtin.template:
    src: omeka-backup.sh.j2
    dest: /usr/local/bin/omeka-backup.sh
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Set up cron jobs for each backup-enabled instance
  ansible.builtin.cron:
    name: "omeka-backup-{{ cron_instance.key }}"
    job: "/usr/local/bin/omeka-backup.sh {{ cron_instance.key }} >> /var/log/omeka-backup-{{ cron_instance.key }}.log 2>&1"
    cron_file: "omeka-backup-{{ cron_instance.key }}"
    user: root
    minute: "{{ cron_instance.value.backup_schedule.split(' ')[0] }}"
    hour: "{{ cron_instance.value.backup_schedule.split(' ')[1] }}"
    day: "{{ cron_instance.value.backup_schedule.split(' ')[2] }}"
    month: "{{ cron_instance.value.backup_schedule.split(' ')[3] }}"
    weekday: "{{ cron_instance.value.backup_schedule.split(' ')[4] }}"
  loop: "{{ omeka_instances | dict2items }}"
  loop_control:
    loop_var: cron_instance
    label: "{{ cron_instance.key }}"
  when: cron_instance.value.backup_enabled | default(false)
  become: true

- name: Set up cron job for backup rotation cleanup
  ansible.builtin.cron:
    name: "omeka-backup-cleanup"
    job: >-
      find {{ backup_base_dir }} -type f \( -name '*.sql.gz' -o -name '*.tar.gz' \)
      -mtime +{{ backup_retention_days }} -delete
      >> /var/log/omeka-backup-cleanup.log 2>&1
    cron_file: "omeka-backup-cleanup"
    user: root
    minute: "30"
    hour: "4"
    day: "*"
    month: "*"
    weekday: "*"
  become: true
